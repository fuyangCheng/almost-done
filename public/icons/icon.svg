<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#5856D6"/>
    </linearGradient>
    <linearGradient id="piece" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.95)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.75)"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 2×2 puzzle grid centered, pieces slightly separated -->
  <!-- Piece size: 140×140, gap: 10, total: 290×290, offset: 111,111 -->

  <!-- Top-left piece (lit) -->
  <path d="
    M 111 111
    L 221 111
    L 221 165
    C 221 165, 236 153, 236 166 C 236 179, 221 168, 221 168
    L 221 251
    L 168 251
    C 168 251, 179 265, 166 265 C 153 265, 164 251, 164 251
    L 111 251
    Z
  " fill="url(#piece)"/>

  <!-- Top-right piece (lit) -->
  <path d="
    M 231 111
    L 401 111
    L 401 164
    C 401 164, 386 153, 386 166 C 386 179, 401 168, 401 168
    L 401 251
    L 358 251
    C 358 251, 369 265, 356 265 C 343 265, 354 251, 354 251
    L 231 251
    L 231 168
    C 231 168, 216 179, 216 166 C 216 153, 231 165, 231 165
    Z
  " fill="url(#piece)" opacity="0.9"/>

  <!-- Bottom-left piece (unlit / outline only) -->
  <path d="
    M 111 261
    L 164 261
    C 164 261, 153 247, 166 247 C 179 247, 168 261, 168 261
    L 221 261
    L 221 401
    L 111 401
    Z
  " fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="6" stroke-dasharray="12 8"/>

  <!-- Bottom-right piece (unlit / outline only) -->
  <path d="
    M 231 261
    L 354 261
    C 354 261, 343 247, 356 247 C 369 247, 358 261, 358 261
    L 401 261
    L 401 401
    L 231 401
    L 231 268
    C 231 268, 216 279, 216 266 C 216 253, 231 261, 231 261
    Z
  " fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="6" stroke-dasharray="12 8"/>
</svg>
